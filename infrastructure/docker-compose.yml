services:
  # --- STORAGE ---
  minio:
    image: minio/minio
    container_name: minio_storage
    volumes:
      # Since the YAML is in 'infrastructure', minio/data is in the same spot
      - ./minio/data:/data 
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    command: server /data --console-address ":9001"

  # --- INGESTOR ---
  data_mover:
    # Since the YAML is in 'infrastructure', ingestor is in the same spot
    build: ./ingestor 
    container_name: python_ingestor
    depends_on:
      - minio
    volumes:
      # '..' goes up to the Project folder to find the Data folder
      - ../Data/raw:/app/Data/raw
  
  spark_transformer:
    image: bitnamilegacy/spark:3.5
    container_name: spark_transformer
    user: root 
    tty: true          
    stdin_open: true   
    environment:
      - SPARK_MODE=master
      - PYSPARK_PYTHON=python3
    volumes:
      - ./transformer:/opt/bitnami/spark/jobs
      - ../Data:/app/Data
    ports:
      - "8080:8080"

  api:
    build: ./api
    container_name: taxi_api
    ports:
      - "8000:8000"
    environment:
      - MINIO_ENDPOINT=http://minio:9000
    depends_on:
      - minio